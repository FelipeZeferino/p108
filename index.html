<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teoria das Filas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Calculadora de Filas</h1>

<div class="tabs">
  <div class="tab active" onclick="openTab('mm1')">M/M/1</div>
  <div class="tab" onclick="openTab('mms')">M/M/s &gt; 1</div>
  <div class="tab" onclick="openTab('mm1k')">M/M/1/K</div>
  <div class="tab" onclick="openTab('mmsk')">M/M/s &gt; 1/K</div>
  <div class="tab" onclick="openTab('mm1n')">M/M/1/N</div>
  <div class="tab" onclick="openTab('mmsn')">M/M/s &gt; 1/N</div>
  <div class="tab" onclick="openTab('mg1')">M/G/1</div>
  <div class="tab" onclick="openTab('prioridades')">Prioridades</div>
</div>

<!-- M/M/1 -->
<div id="mm1" class="content active">
  <h2>M/M/1</h2>

  <div class="form-grid">
    <div class="field">
      <label>λ (taxa de chegada):</label>
      <input type="number" id="mm1_lambda" step="0.01">
    </div>

    <div class="field">
      <label>μ (taxa de serviço):</label>
      <input type="number" id="mm1_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        t (tempo para calcular P(W &gt; t) e P(Wq &gt; t)):
        <span class="tooltip" tabindex="0" data-tooltip="Use este campo quando o exercício perguntar a probabilidade de o tempo ser maior que algum valor, como P(W > 1) ou P(Wq > 1). Use a mesma unidade de λ e μ.">?</span>
      </label>
      <input type="number" id="mm1_tempo" step="0.01" value="1">
    </div>

    <div class="field">
      <label class="label-with-help">
        W alvo (tempo médio desejado no sistema):
        <span class="tooltip" tabindex="0" data-tooltip="Use este campo quando o exercício pedir a taxa de chegada λ necessária para atingir um tempo médio desejado no sistema. Exemplo: descobrir λ para que W seja 1,25 horas.">?</span>
      </label>
      <input type="number" id="mm1_w_alvo" step="0.01" value="1.25">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMM1()">Calcular</button>
  </div>

  <div class="result" id="mm1_result"></div>
</div>

<!-- M/M/s -->
<div id="mms" class="content">
  <h2>M/M/s &gt; 1</h2>

  <div class="form-grid">
    <div class="field">
      <label class="label-with-help">
        λ (taxa de chegada):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa média de chegada de clientes ao sistema por unidade de tempo.">?</span>
      </label>
      <input type="number" id="mms_lambda" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        μ (taxa de serviço):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa média de atendimento de cada servidor individualmente.">?</span>
      </label>
      <input type="number" id="mms_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        s (nº de servidores, maior que 1):
        <span class="tooltip" tabindex="0" data-tooltip="Quantidade de servidores em paralelo. Use 2 ou mais nesta aba.">?</span>
      </label>
      <input type="number" id="mms_s" min="2" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMMS()">Calcular</button>
  </div>

  <div class="result" id="mms_result"></div>
</div>

<!-- M/G/1 -->
<div id="mg1" class="content">
  <h2>M/G/1</h2>

  <div class="form-grid">
    <div class="field">
      <label>λ (taxa de chegada):</label>
      <input type="number" id="mg1_lambda" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        μ (taxa de atendimento):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa média de atendimentos por unidade de tempo. A média do atendimento é 1/μ.">?</span>
      </label>
      <input type="number" id="mg1_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        σ² (variância do tempo de atendimento):
        <span class="tooltip" tabindex="0" data-tooltip="Variância do tempo de atendimento. Use 0 para atendimento constante.">?</span>
      </label>
      <input type="number" id="mg1_sigma2" step="0.01">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMG1()">Calcular</button>
  </div>

  <div class="result" id="mg1_result"></div>
</div>

<!-- Prioridades -->
<div id="prioridades" class="content">
  <h2>Prioridades</h2>

  <div class="form-grid">
    <div class="field">
      <label class="label-with-help">
        Regime de prioridade:
        <span class="tooltip" tabindex="0" data-tooltip="Sem interrupção termina o atendimento atual. Com interrupção pausa classes menores quando chega uma classe maior.">?</span>
      </label>
      <select id="prioridades_regime" onchange="atualizarInterfacePrioridades()">
        <option value="sem">Sem interrupção</option>
        <option value="com">Com interrupção</option>
      </select>
    </div>

    <div class="field">
      <label class="label-with-help">
        k (nº de classes):
        <span class="tooltip" tabindex="0" data-tooltip="Quantidade de classes de prioridade. Classe 1 tem a maior prioridade.">?</span>
      </label>
      <input type="number" id="prioridades_k" min="2" step="1" value="2" oninput="atualizarCamposPrioridades()">
    </div>

    <div id="prioridades_lambdas" class="dynamic-fields"></div>

    <div class="field">
      <label>μ (taxa de atendimento):</label>
      <input type="number" id="prioridades_mu" step="0.01">
    </div>

    <div id="prioridades_servidores_campo" class="field">
      <label class="label-with-help">
        s (nº de servidores):
        <span class="tooltip" tabindex="0" data-tooltip="Quantidade de servidores em paralelo atendendo todas as classes.">?</span>
      </label>
      <input type="number" id="prioridades_s" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularPrioridades()">Calcular</button>
  </div>

  <div class="result" id="prioridades_result"></div>
</div>

<div class="content-alert-slot">
  <p id="prioridades_k_aviso" class="field-warning" hidden>Use um número inteiro maior ou igual a 2. O modelo de prioridades precisa de pelo menos duas classes.</p>
</div>

<!-- M/M/1/K -->
<div id="mm1k" class="content">
  <h2>M/M/1/K</h2>

  <div class="form-grid">
    <div class="field">
      <label>λ (taxa de chegada):</label>
      <input type="number" id="mm1k_lambda" step="0.01">
    </div>

    <div class="field">
      <label>μ (taxa de serviço):</label>
      <input type="number" id="mm1k_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        K (capacidade total do sistema):
        <span class="tooltip" tabindex="0" data-tooltip="Capacidade total do sistema, incluindo o cliente em atendimento e os clientes aguardando. Se o sistema estiver cheio, uma nova chegada é bloqueada.">?</span>
      </label>
      <input type="number" id="mm1k_k" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMM1K()">Calcular</button>
  </div>

  <div class="result" id="mm1k_result"></div>
</div>

<!-- M/M/s/K -->
<div id="mmsk" class="content">
  <h2>M/M/s &gt; 1/K</h2>

  <div class="form-grid">
    <div class="field">
      <label>λ (taxa de chegada):</label>
      <input type="number" id="mmsk_lambda" step="0.01">
    </div>

    <div class="field">
      <label>μ (taxa de serviço):</label>
      <input type="number" id="mmsk_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        s (nº de servidores, maior que 1):
        <span class="tooltip" tabindex="0" data-tooltip="Use 2 ou mais servidores nesta aba. Se houver apenas 1 servidor, use o modelo M/M/1/K.">?</span>
      </label>
      <input type="number" id="mmsk_s" min="2" step="1">
    </div>

    <div class="field">
      <label class="label-with-help">
        K (capacidade total do sistema):
        <span class="tooltip" tabindex="0" data-tooltip="Capacidade total do sistema, incluindo clientes em atendimento e clientes aguardando. K deve ser maior ou igual a s.">?</span>
      </label>
      <input type="number" id="mmsk_k" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMMSK()">Calcular</button>
  </div>

  <div class="result" id="mmsk_result"></div>
</div>

<!-- M/M/1/N -->
<div id="mm1n" class="content">
  <h2>M/M/1/N</h2>

  <div class="form-grid">
    <div class="field">
      <label class="label-with-help">
        λ (taxa de chegada/quebra por cliente externo):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa individual de chegada ou quebra para cada cliente que está fora do sistema. Em população finita, a chegada total depende de quantos clientes ainda estão fora.">?</span>
      </label>
      <input type="number" id="mm1n_lambda" step="0.01">
    </div>

    <div class="field">
      <label>μ (taxa de serviço/reparo):</label>
      <input type="number" id="mm1n_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        N (população total possível):
        <span class="tooltip" tabindex="0" data-tooltip="Total fixo de clientes possíveis, incluindo quem está no sistema e quem está fora dele. Exemplo: quantidade total de máquinas ou robôs.">?</span>
      </label>
      <input type="number" id="mm1n_n" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMM1N()">Calcular</button>
  </div>

  <div class="result" id="mm1n_result"></div>
</div>

<!-- M/M/s/N -->
<div id="mmsn" class="content">
  <h2>M/M/s &gt; 1/N</h2>

  <div class="form-grid">
    <div class="field">
      <label class="label-with-help">
        λ (taxa de chegada/quebra por cliente externo):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa individual de chegada ou quebra para cada cliente que está fora do sistema. A chegada total diminui quando há mais clientes no sistema.">?</span>
      </label>
      <input type="number" id="mmsn_lambda" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        μ (taxa de serviço/reparo por servidor):
        <span class="tooltip" tabindex="0" data-tooltip="Taxa de atendimento de cada servidor individualmente. Com vários servidores, a taxa total de saída depende de quantos estão ocupados.">?</span>
      </label>
      <input type="number" id="mmsn_mu" step="0.01">
    </div>

    <div class="field">
      <label class="label-with-help">
        s (nº de servidores/técnicos, maior que 1):
        <span class="tooltip" tabindex="0" data-tooltip="Use 2 ou mais servidores nesta aba. Se houver apenas 1 servidor, use o modelo M/M/1/N.">?</span>
      </label>
      <input type="number" id="mmsn_s" min="2" step="1">
    </div>

    <div class="field">
      <label class="label-with-help">
        N (população total possível):
        <span class="tooltip" tabindex="0" data-tooltip="Total fixo de clientes possíveis, incluindo quem está no sistema e quem está fora dele. Exemplo: quantidade total de máquinas ou robôs.">?</span>
      </label>
      <input type="number" id="mmsn_n" step="1">
    </div>
  </div>

  <div class="actions">
    <button onclick="calcularMMSN()">Calcular</button>
  </div>

  <div class="result" id="mmsn_result"></div>
</div>

<script src="calculos.js"></script>
<script>
function openTab(tabId) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(tabId).classList.add('active');
  event.target.classList.add('active');
}

function formatar(valor) {
  return valor.toFixed(2);
}

function formatarProbabilidade(valor) {
  return `${valor.toFixed(4)} (${(valor * 100).toFixed(2)}%)`;
}

function criarLinhaResultado(nome, valor, tooltip) {
  return `
    <div class="result-row">
      <span class="result-name">${nome}</span>
      <span class="result-value">${valor}</span>
      <span class="tooltip" tabindex="0" data-tooltip="${tooltip}">?</span>
    </div>
  `;
}

function criarLinhasProbabilidades(probabilidades) {
  const linhas = probabilidades.map((probabilidade, indice) =>
    criarLinhaResultado(
      `P${indice}`,
      formatarProbabilidade(probabilidade),
      `Probabilidade de haver exatamente ${indice} cliente(s) no sistema.`
    )
  ).join("");

  return `
    <div class="probability-list">
      <h3>Distribuição de probabilidades</h3>
      ${linhas}
    </div>
  `;
}

// M/M/1
function calcularMM1() {
  const lambda = parseFloat(document.getElementById('mm1_lambda').value);
  const mu = parseFloat(document.getElementById('mm1_mu').value);
  const tempo = parseFloat(document.getElementById('mm1_tempo').value);
  const wAlvo = parseFloat(document.getElementById('mm1_w_alvo').value);
  const resultado = document.getElementById('mm1_result');

  let valores;
  try {
    valores = CalculosFilas.calcularMM1Valores(lambda, mu, tempo, wAlvo);
  } catch (erro) {
    resultado.innerText = erro.message;
    return;
  }

  const lambdaParaWAlvoTexto = valores.lambdaParaWAlvo !== null
    ? formatar(valores.lambdaParaWAlvo)
    : "Não aplicável";

  resultado.innerHTML = `
    ${criarLinhaResultado("ρ", formatar(valores.rho), "Taxa de utilização do sistema. Indica a fração do tempo em que o barbeiro fica ocupado.")}
    ${criarLinhaResultado("P0", formatarProbabilidade(valores.P0), "Probabilidade de não haver clientes no sistema. Também representa a chance de um cliente chegar e não precisar esperar.")}
    ${criarLinhaResultado("P(ocupado)", formatarProbabilidade(valores.POcupado), "Probabilidade de o servidor estar ocupado. Em M/M/1, é igual a ρ.")}
    ${criarLinhaResultado("L", formatar(valores.L), "Número médio de clientes no sistema, incluindo quem está em atendimento e quem está na fila.")}
    ${criarLinhaResultado("Lq", formatar(valores.Lq), "Número médio de clientes aguardando na fila antes do atendimento começar.")}
    ${criarLinhaResultado("W", formatar(valores.W), "Tempo médio que um cliente permanece no sistema, incluindo espera na fila e atendimento.")}
    ${criarLinhaResultado("Wq", formatar(valores.Wq), "Tempo médio que um cliente espera na fila antes de começar o atendimento.")}
    ${criarLinhaResultado(`P(W > ${formatar(tempo)})`, formatarProbabilidade(valores.probWMaiorQueT), "Probabilidade de o tempo total no sistema ser maior que o tempo t informado.")}
    ${criarLinhaResultado(`P(Wq > ${formatar(tempo)})`, formatarProbabilidade(valores.probWqMaiorQueT), "Probabilidade de o tempo de espera na fila ser maior que o tempo t informado.")}
    ${criarLinhaResultado("λ para W alvo", lambdaParaWAlvoTexto, "Taxa de chegada que faria o tempo médio no sistema atingir o W alvo informado, mantendo a mesma taxa de serviço μ.")}
  `;
}

function calcularMMS() {
  const lambda = parseFloat(document.getElementById('mms_lambda').value);
  const mu = parseFloat(document.getElementById('mms_mu').value);
  const s = Number(document.getElementById('mms_s').value);
  const resultado = document.getElementById('mms_result');

  let valores;
  try {
    valores = CalculosFilas.calcularMMSValores(lambda, mu, s);
  } catch (erro) {
    resultado.innerText = erro.message;
    return;
  }

  resultado.innerHTML = `
    ${criarLinhaResultado("ρ", formatar(valores.rho), "Utilização média de cada servidor. Indica a fração do tempo em que um servidor fica ocupado.")}
    ${criarLinhaResultado("P0", formatarProbabilidade(valores.P0), "Probabilidade de não haver clientes no sistema.")}
    ${criarLinhaResultado("Lq", formatar(valores.Lq), "Número médio de clientes aguardando na fila antes do atendimento começar.")}
    ${criarLinhaResultado("L", formatar(valores.L), "Número médio de clientes no sistema, incluindo fila e atendimento.")}
    ${criarLinhaResultado("Wq", formatar(valores.Wq), "Tempo médio que um cliente espera na fila antes de começar o atendimento.")}
    ${criarLinhaResultado("W", formatar(valores.W), "Tempo médio que um cliente permanece no sistema, incluindo espera e atendimento.")}
  `;
}

function calcularMG1() {
  const lambda = parseFloat(document.getElementById('mg1_lambda').value);
  const mu = parseFloat(document.getElementById('mg1_mu').value);
  const sigma2 = parseFloat(document.getElementById('mg1_sigma2').value);
  const resultado = document.getElementById('mg1_result');

  let valores;
  try {
    valores = CalculosFilas.calcularMG1Valores(lambda, mu, sigma2);
  } catch (erro) {
    resultado.innerText = erro.message;
    return;
  }

  resultado.innerHTML = `
    ${criarLinhaResultado("ρ", formatar(valores.rho), "Utilização do servidor. Indica a fração média de tempo ocupado.")}
    ${criarLinhaResultado("P0", formatarProbabilidade(valores.P0), "Probabilidade de o sistema estar vazio.")}
    ${criarLinhaResultado("Lq", formatar(valores.Lq), "Número médio de clientes aguardando atendimento.")}
    ${criarLinhaResultado("L", formatar(valores.L), "Número médio de clientes no sistema, incluindo fila e atendimento.")}
    ${criarLinhaResultado("Wq", formatar(valores.Wq), "Tempo médio de espera na fila antes do atendimento.")}
    ${criarLinhaResultado("W", formatar(valores.W), "Tempo médio no sistema, incluindo espera e atendimento.")}
  `;
}

function atualizarCamposPrioridades() {
  const k = Number(document.getElementById('prioridades_k').value);
  const container = document.getElementById('prioridades_lambdas');
  const aviso = document.getElementById('prioridades_k_aviso');
  const valoresAtuais = Array.from(container.querySelectorAll('input')).map(input => input.value);

  if (!Number.isInteger(k) || k < 2) {
    container.innerHTML = "";
    aviso.hidden = false;
    return;
  }

  aviso.hidden = true;
  container.innerHTML = Array.from({ length: k }, (_, indice) => `
    <div class="field">
      <label>λ${indice + 1} (taxa da classe ${indice + 1}):</label>
      <input type="number" id="prioridades_lambda_${indice + 1}" step="0.01" value="${valoresAtuais[indice] || ""}">
    </div>
  `).join("");
}

function atualizarInterfacePrioridades() {
  const regime = document.getElementById('prioridades_regime').value;
  const campoServidores = document.getElementById('prioridades_servidores_campo');
  const resultado = document.getElementById('prioridades_result');

  campoServidores.style.display = regime === "sem" ? "block" : "none";
  resultado.innerText = "";
}

function calcularPrioridades() {
  const k = Number(document.getElementById('prioridades_k').value);
  const regime = document.getElementById('prioridades_regime').value;
  const mu = parseFloat(document.getElementById('prioridades_mu').value);
  const s = Number(document.getElementById('prioridades_s').value);
  const resultado = document.getElementById('prioridades_result');

  try {
    if (!Number.isInteger(k) || k < 2) {
      throw new Error("k deve ser um número inteiro maior ou igual a 2.");
    }

    const lambdas = [];
    for (let indice = 1; indice <= k; indice++) {
      lambdas.push(parseFloat(document.getElementById(`prioridades_lambda_${indice}`).value));
    }

    const valores = regime === "com"
      ? CalculosFilas.calcularPrioridadesComInterrupcao(lambdas, mu)
      : CalculosFilas.calcularPrioridadesSemInterrupcao(lambdas, mu, s);
    const regimeTexto = regime === "com" ? "Com interrupção" : "Sem interrupção";
    const classesHtml = valores.classes.map(classe => `
      <div class="priority-class-result">
        <h3>Classe ${classe.classe}</h3>
        ${criarLinhaResultado(`W${classe.classe}`, formatar(classe.W), `Tempo médio no sistema para a classe ${classe.classe}.`)}
        ${criarLinhaResultado(`Wq${classe.classe}`, formatar(classe.Wq), `Tempo médio de espera na fila para a classe ${classe.classe}.`)}
        ${criarLinhaResultado(`L${classe.classe}`, formatar(classe.L), `Número médio de clientes da classe ${classe.classe} no sistema.`)}
        ${criarLinhaResultado(`Lq${classe.classe}`, formatar(classe.Lq), `Número médio de clientes da classe ${classe.classe} aguardando na fila.`)}
      </div>
    `).join("");

    resultado.innerHTML = `
      ${criarLinhaResultado("Regime", regimeTexto, "Tipo de regra usada quando classes de prioridades diferentes disputam atendimento.")}
      ${criarLinhaResultado("P0", formatarProbabilidade(valores.P0), "Probabilidade de o sistema estar vazio.")}
      ${criarLinhaResultado("ρ", formatar(valores.rho), "Utilização global do sistema considerando todas as classes.")}
      ${criarLinhaResultado("λ total", formatar(valores.lambdaTotal), "Soma das taxas de chegada de todas as classes.")}
      ${classesHtml}
    `;
  } catch (erro) {
    resultado.innerText = erro.message;
  }
}

function calcularMM1K() {
  const lambda = parseFloat(document.getElementById('mm1k_lambda').value);
  const mu = parseFloat(document.getElementById('mm1k_mu').value);
  const K = Number(document.getElementById('mm1k_k').value);
  const resultado = document.getElementById('mm1k_result');

  let valores;
  try {
    valores = CalculosFilas.calcularMM1KValores(lambda, mu, K);
  } catch (erro) {
    resultado.innerText = erro.message;
    return;
  }

  resultado.innerHTML = `
    ${criarLinhaResultado("ρ", formatar(valores.rho), "Razão de tráfego do sistema, calculada por λ / μ.")}
    ${criarLinhaResultado("P0", formatarProbabilidade(valores.P0), "Probabilidade de o sistema estar vazio.")}
    ${criarLinhaResultado("PK / bloqueio", formatarProbabilidade(valores.PK), "Probabilidade de o sistema estar cheio. Uma chegada nesse estado é bloqueada.")}
    ${criarLinhaResultado("λ efetiva", formatar(valores.lambdaEfetiva), "Taxa real de entrada no sistema depois de descontar as chegadas bloqueadas.")}
    ${criarLinhaResultado("L", formatar(valores.L), "Número médio de clientes no sistema, incluindo atendimento e fila.")}
    ${criarLinhaResultado("Lq", formatar(valores.Lq), "Número médio de clientes aguardando na fila.")}
    ${criarLinhaResultado("W", formatar(valores.W), "Tempo médio que um cliente aceito permanece no sistema.")}
